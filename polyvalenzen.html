<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Polyvalenzen — Exam Sharing Analysis</title>
<style>
:root {
  --bg: #111318; --panel: #16191f; --sidebar: #1a1d24;
  --border: #2a2d35; --border2: #353840;
  --text: #c9cdd8; --dim: #606674; --bright: #e8eaf0;
  --accent: #4f8ef7; --green: #3ecf8e; --yellow: #f7c948;
  --hover: #1f2330;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); }

#topbar {
  height: 46px; background: #0d0f14;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 18px; flex-shrink: 0;
}
#topbar h1 { font-size: 14px; font-weight: 700; color: var(--bright); }
#topbar h1 em { color: var(--accent); font-style: normal; }
#cluster-link-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.35);
  color: var(--accent); padding: 4px 11px; border-radius: 4px;
  font-size: 11px; font-weight: 600; text-decoration: none; white-space: nowrap;
  transition: all .1s;
}
#cluster-link-btn:hover { background: rgba(79,142,247,.22); border-color: var(--accent); }
#col-info { font-size: 11px; color: var(--dim); margin-left: auto; }
#col-info strong { color: var(--text); }

#subset-bar {
  background: var(--panel); border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 10px; padding: 8px 18px; flex-shrink: 0;
}
#subset-bar label { font-size: 11px; color: var(--dim); white-space: nowrap; }
#subset-col-sel {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; max-width: 220px;
}
#subset-val-inp {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 10px; border-radius: 4px; font-size: 12px; width: 180px;
}
#subset-val-inp::placeholder { color: var(--dim); }
#subset-clear-btn {
  background: none; border: 1px solid var(--border2); color: var(--dim);
  padding: 3px 9px; border-radius: 4px; font-size: 11px; cursor: pointer;
}
#subset-clear-btn:hover { color: var(--text); border-color: var(--dim); }
#subset-count { font-size: 11px; margin-left: 6px; color: var(--dim); }
#subset-count strong { color: var(--green); }

#main { max-width: 980px; margin: 0 auto; padding: 28px 20px 80px; }

.section-heading {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--dim); border-bottom: 1px solid var(--border); padding-bottom: 8px;
  margin-bottom: 16px; margin-top: 32px;
}
.section-heading:first-child { margin-top: 0; }

#error-banner {
  background: #2d1515; border: 1px solid #6b2020; border-radius: 6px;
  padding: 14px 18px; color: #f08080; margin-bottom: 20px; font-size: 12px; display:none;
}
#loading-bar {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: 18px; color: var(--dim); font-size: 12px; margin-bottom: 20px; text-align:center; display:none;
}

/* ── Q&A CARDS ── */
.pv-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 16px; overflow: hidden;
}
.pv-card-header {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 18px;
}
.pv-qnum {
  font-size: 11px; font-weight: 700; color: var(--accent);
  background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.3);
  border-radius: 4px; padding: 2px 7px; flex-shrink: 0; margin-top: 2px;
}
.pv-qtitle { font-size: 13px; font-weight: 600; color: var(--bright); line-height: 1.5; }
.pv-qsub { font-size: 11px; color: var(--dim); margin-top: 3px; line-height: 1.5; }
.pv-show-btn {
  margin-left: auto; flex-shrink: 0;
  background: var(--bg); border: 1px solid var(--border2);
  color: var(--accent); padding: 5px 12px; border-radius: 4px;
  font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: all .1s; align-self: center;
}
.pv-show-btn:hover:not(:disabled) { background: rgba(79,142,247,.12); border-color: var(--accent); }
.pv-show-btn.open { background: var(--accent); color: #fff; border-color: var(--accent); }
.pv-show-btn:disabled { opacity: .4; cursor: not-allowed; }

.pv-results { border-top: 1px solid var(--border); padding: 10px 0 6px; }
.pv-results-inner { padding: 0 18px; }

.pv-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 8px; border-radius: 4px; cursor: pointer;
  transition: background .1s;
}
.pv-row:hover { background: var(--hover); }
.pv-rank { font-size: 10px; color: var(--dim); width: 28px; text-align: right; flex-shrink: 0; }
.pv-label { font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pv-bar-wrap { width: 140px; flex-shrink: 0; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.pv-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
.pv-score { font-size: 11px; color: var(--accent); font-weight: 600; width: 120px; flex-shrink: 0; text-align: right; }

.pv-show-all {
  margin: 8px 18px 10px; padding: 5px 12px; background: none;
  border: 1px solid var(--border2); color: var(--dim); border-radius: 4px;
  font-size: 11px; cursor: pointer; display: block; width: calc(100% - 36px); text-align: center;
}
.pv-show-all:hover { color: var(--text); border-color: var(--dim); }
.pv-computing { padding: 18px; text-align: center; color: var(--dim); font-size: 12px; }
.pv-row-hint { font-size: 10px; color: var(--dim); padding: 4px 8px 8px; font-style: italic; }

/* ── RADIAL CARD ── */
#radial-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
}
#radial-controls {
  display: flex; align-items: center; gap: 12px; padding: 12px 18px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
#radial-controls label { font-size: 11px; color: var(--dim); white-space: nowrap; }
#outer-dim-sel {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer;
}
.toggle-group {
  display: flex; border: 1px solid var(--border2); border-radius: 4px; overflow: hidden;
}
.toggle-btn {
  background: none; border: none; color: var(--dim); padding: 5px 14px;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all .1s;
}
.toggle-btn.active { background: var(--accent); color: #fff; }
.toggle-btn:not(.active):hover { background: var(--hover); color: var(--text); }

#exam-search-wrap {
  display: flex; align-items: center; gap: 6px; margin-left: auto;
}
#exam-search {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 10px; border-radius: 4px; font-size: 12px; width: 220px;
}
#exam-search::placeholder { color: var(--dim); }
#exam-search-clear {
  background: none; border: 1px solid var(--border2); color: var(--dim);
  padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
}
#exam-search-clear:hover { color: var(--text); }
#exam-search-results {
  position: absolute; z-index: 200; background: #0d0f14;
  border: 1px solid var(--border2); border-radius: 5px;
  max-height: 220px; overflow-y: auto; min-width: 280px;
  box-shadow: 0 6px 20px rgba(0,0,0,.5);
}
.exam-sr-item {
  padding: 6px 12px; font-size: 12px; color: var(--text); cursor: pointer;
  border-bottom: 1px solid var(--border);
}
.exam-sr-item:last-child { border-bottom: none; }
.exam-sr-item:hover, .exam-sr-item.active { background: var(--hover); color: var(--bright); }

#radial-stats {
  padding: 6px 18px 8px; font-size: 11px; color: var(--dim);
  border-bottom: 1px solid var(--border);
}
#radial-stats strong { color: var(--green); }
#selected-exam-info {
  padding: 6px 18px 8px; font-size: 11px;
  border-bottom: 1px solid var(--border); display: none;
  background: rgba(79,142,247,.06);
}
#selected-exam-info strong { color: var(--accent); }

#radial-svg-wrap {
  background: var(--bg); display: flex; justify-content: center; align-items: center;
  min-height: 620px; position: relative;
}
#radial-svg-wrap svg { display: block; }

#radial-tooltip {
  position: fixed; pointer-events: none; z-index: 300;
  background: #0d0f14; border: 1px solid var(--border2); border-radius: 5px;
  padding: 7px 11px; font-size: 11px; color: var(--bright); max-width: 280px;
  display: none; line-height: 1.5;
}

/* ── DETAIL PANEL ── */
#detail-panel {
  position: fixed; inset: 0; background: var(--bg); z-index: 100;
  display: none; flex-direction: column;
}
#detail-topbar {
  height: 46px; background: #0d0f14; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 18px; flex-shrink: 0;
}
#detail-back {
  background: none; border: 1px solid var(--border2); color: var(--text);
  padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
}
#detail-back:hover { border-color: var(--dim); }
#detail-title { font-size: 13px; font-weight: 600; color: var(--bright); }
#detail-subtitle { font-size: 11px; color: var(--dim); margin-left: 4px; }
#detail-body { flex: 1; overflow: auto; padding: 20px 28px; }

.dt-table { border-collapse: collapse; width: 100%; font-size: 12px; }
.dt-table th {
  text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700;
  color: var(--dim); text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0;
}
.dt-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
.dt-table tr:hover td { background: var(--hover); }

@keyframes arcPulse {
  0%   { opacity: 1; }
  50%  { opacity: 0.3; }
  100% { opacity: 1; }
}
.arc-pulse { animation: arcPulse 0.7s ease-in-out 3; }
</style>

<body>

<div id="topbar">
  <h1>⬡ Polyvalenzen <em>Exam Sharing Analysis</em></h1>
  <a href="belegt_V1_FINAL_FIXED.html" target="_blank" id="cluster-link-btn">⬡ Cluster Explorer</a>
  <div id="col-info"></div>
</div>

<div id="subset-bar">
  <label>Subset:</label>
  <select id="subset-col-sel"></select>
  <input id="subset-val-inp" type="text" placeholder="filter value…">
  <button id="subset-clear-btn">✕ Clear</button>

<div id="main">
  <div id="error-banner"></div>
  <div id="loading-bar">⏳ Loading and parsing CSV…</div>

  <!-- ── SECTION 1: Q&A ── -->
  <div class="section-heading">Q &amp; A</div>
  <div id="qa-cards"></div>

  <!-- ── SECTION 2: Radial ── -->

  <div id="radial-card">
    <div id="radial-controls">

        <input id="exam-search" type="text" placeholder="Search exam title…">

<!-- Detail panel -->

  <div id="detail-topbar">
    <button id="detail-back">← Back</button>
    <span id="detail-title"></span>
    <span id="detail-subtitle"></span>
  </div>
  <div id="detail-body"></div>
</div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CSV PARSER ──
function detectDelimiter(sample) {
  const firstLine = sample.slice(0, 2000).split('\n')[0];
  const delims = [';', ',', '\t', '|'];
  let best = ',', bestN = 0;
  for (const d of delims) {
    const n = (firstLine.match(new RegExp(d === '\t' ? '\t' : ('\\' + d), 'g')) || []).length;
    if (n > bestN) { bestN = n; best = d; }
  }
  return best;
}

function parseCSV(text, delimOverride) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const delim = (!delimOverride || delimOverride === 'auto') ? detectDelimiter(text) : delimOverride;
  const allRows = [];
  let row = [], cell = '', inQuote = false, i = 0;
  const len = text.length;
  while (i < len) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"') {
        if (text[i+1] === '"') { cell += '"'; i += 2; }
        else { inQuote = false; i++; }
      } else { cell += ch; i++; }
    } else {
      if (ch === '"') { inQuote = true; i++; }
      else if (ch === delim) { row.push(cell.trim()); cell = ''; i++; }
      else if (ch === '\n') {
        row.push(cell.trim()); cell = '';
        if (row.some(c => c !== '')) allRows.push(row);
        row = []; i++;
      } else { cell += ch; i++; }
    }
  }
  row.push(cell.trim());
  if (row.some(c => c !== '')) allRows.push(row);
  if (allRows.length < 2) return null;

  const headers = allRows[0];
  const numCols = headers.length;
  const vocabMaps = headers.map(() => new Map());
  const rawRows = [];
  for (let li = 1; li < allRows.length; li++) {
    const cells = allRows[li];
    while (cells.length < numCols) cells.push('');
    rawRows.push(cells.slice(0, numCols));
    for (let ci = 0; ci < numCols; ci++) {
      const v = cells[ci] || '';
      if (!vocabMaps[ci].has(v)) vocabMaps[ci].set(v, vocabMaps[ci].size);
    }
  }
  const vocabs = vocabMaps.map(m => { const a = new Array(m.size); for (const [v,i] of m) a[i]=v; return a; });
  const rows = rawRows.map(cells => cells.map((v, ci) => vocabMaps[ci].get(v) ?? 0));
  return { headers, vocabs, rows, delimiter: delim };
}

// ── STATE ──
const metaRaw = sessionStorage.getItem('polyvData');
if (!metaRaw) {
  document.getElementById('error-banner').style.display = '';
  document.getElementById('error-banner').textContent =
    'No data found. Open this page from the Cluster Explorer via the ⬡ Polyvalenzen button.';
}

let meta = null, headers, vocabs, rows, colIdx = {};
let subsetCI = -1, subsetVal = '';
let radialMode = 'poly';
let outerCI = -1;
let selectedExamEv = null; // currently selected exam vidx

try { meta = metaRaw ? JSON.parse(metaRaw) : null; } catch(e) {}

function getActiveRows() {
  if (subsetCI < 0 || subsetVal === '') return rows;
  const lower = subsetVal.toLowerCase();
  return rows.filter(r => (vocabs[subsetCI][r[subsetCI]] || '').toLowerCase().includes(lower));
}

function findCol(names) {
  for (const n of names) {
    const i = (headers||[]).findIndex(h => h.toLowerCase() === n.toLowerCase());
    if (i >= 0) return i;
  }
  return -1;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.style.display = '';
  el.innerHTML = msg;
}

// ── Q&A COMPUTATIONS ──
function computeQ1() {
  const examCI = colIdx.exam, sgCI = colIdx.studiengang;
  const map = new Map();
  for (const row of getActiveRows()) {
    const ev = row[examCI], sv = row[sgCI];
    if (!map.has(ev)) map.set(ev, new Set());
    map.get(ev).add(sv);
  }
  return [...map.entries()]
    .map(([ev, s]) => ({ label: vocabs[examCI][ev], score: s.size, scoreLabel: s.size + ' Studiengänge' }))
    .sort((a,b) => b.score - a.score);
}

function computeQ2() {
  const examCI = colIdx.exam, sgCI = colIdx.studiengang;
  const examToSG = new Map(), sgToExams = new Map();
  for (const row of getActiveRows()) {
    const ev = row[examCI], sv = row[sgCI];
    if (!examToSG.has(ev)) examToSG.set(ev, new Set());
    examToSG.get(ev).add(sv);
    if (!sgToExams.has(sv)) sgToExams.set(sv, new Set());
    sgToExams.get(sv).add(ev);
  }
  return [...sgToExams.entries()]
    .map(([sv, exams]) => {
      const shared = [...exams].filter(ev => examToSG.get(ev).size > 1).length;
      return { label: vocabs[sgCI][sv], score: shared, scoreLabel: shared + ' shared exams (of ' + exams.size + ')' };
    })
    .sort((a,b) => b.score - a.score);
}

function computeQ3() {
  const examCI = colIdx.exam, abCI = colIdx.abschluss;
  const map = new Map();
  for (const row of getActiveRows()) {
    const ev = row[examCI], av = row[abCI];
    if (!map.has(ev)) map.set(ev, new Set());
    map.get(ev).add(av);
  }
  return [...map.entries()]
    .map(([ev, s]) => ({ label: vocabs[examCI][ev], score: s.size, scoreLabel: s.size + ' Abschlussarten' }))
    .sort((a,b) => b.score - a.score);
}

// ── Q&A RENDER ──
const TOP_N = 50;

function renderResults(container, results, jumpColHeader) {
  container.innerHTML = '';
  if (!results.length) { container.innerHTML = '<div class="pv-computing">No results.</div>'; return; }
  const maxScore = results[0].score;
  const shown = results.slice(0, TOP_N);
  const rest  = results.slice(TOP_N);
  const inner = document.createElement('div');
  inner.className = 'pv-results-inner';
  const hint = document.createElement('div');
  hint.className = 'pv-row-hint';
  hint.textContent = 'Click any row to see all its data';
  inner.appendChild(hint);

  function addRow(r, rank) {
    const el = document.createElement('div');
    el.className = 'pv-row';
    const pct = maxScore > 0 ? (r.score / maxScore * 100).toFixed(1) : 0;
    el.innerHTML =
      '<span class="pv-rank">' + rank + '.</span>' +
      '<span class="pv-label" title="' + escHtml(r.label) + '">' + escHtml(r.label) + '</span>' +
      '<span class="pv-bar-wrap"><span class="pv-bar-fill" style="width:' + pct + '%"></span></span>' +
      '<span class="pv-score">' + escHtml(r.scoreLabel) + '</span>';
    el.addEventListener('click', () => showDetail(jumpColHeader, r.label, r.scoreLabel));
    inner.appendChild(el);
  }

  shown.forEach((r, i) => addRow(r, i + 1));
  if (rest.length) {
    const btn = document.createElement('button');
    btn.className = 'pv-show-all';
    btn.textContent = 'Show all ' + results.length.toLocaleString() + ' results';
    btn.addEventListener('click', () => { btn.remove(); rest.forEach((r,i) => addRow(r, TOP_N+i+1)); });
    inner.appendChild(btn);
  }
  container.appendChild(inner);
}

// ── DETAIL PANEL ──
document.getElementById('detail-back').addEventListener('click', () => {
  document.getElementById('detail-panel').style.display = 'none';
});

function showDetail(colHeader, value, scoreLabel) {
  const ci = (headers || []).findIndex(h => h === colHeader);
  if (ci < 0 || !rows) return;
  const vidx = (vocabs[ci] || []).findIndex(v => v === value);
  if (vidx < 0) return;
  const matchRows = getActiveRows().filter(row => row[ci] === vidx);
  const displayCols = headers.map((h, i) => ({ h, i })).filter(c => c.i !== ci);
  document.getElementById('detail-title').textContent = value;
  document.getElementById('detail-subtitle').textContent =
    '· ' + matchRows.length.toLocaleString() + ' rows · ' + scoreLabel;
  const body = document.getElementById('detail-body');
  body.innerHTML = '';
  const table = document.createElement('table');
  table.className = 'dt-table';
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  displayCols.forEach(c => { const th = document.createElement('th'); th.textContent = c.h; hrow.appendChild(th); });
  thead.appendChild(hrow); table.appendChild(thead);
  const tbody = document.createElement('tbody');
  const limit = Math.min(matchRows.length, 2000);
  for (let ri = 0; ri < limit; ri++) {
    const row = matchRows[ri];
    const tr = document.createElement('tr');
    displayCols.forEach(c => { const td = document.createElement('td'); td.textContent = vocabs[c.i][row[c.i]] ?? ''; tr.appendChild(td); });
    tbody.appendChild(tr);
  }
  if (matchRows.length > 2000) {
    const tr = document.createElement('tr'); const td = document.createElement('td');
    td.colSpan = displayCols.length;
    td.style.cssText = 'color:var(--dim);text-align:center;padding:12px';
    td.textContent = '… and ' + (matchRows.length - 2000).toLocaleString() + ' more rows';
    tr.appendChild(td); tbody.appendChild(tr);
  }
  table.appendChild(tbody); body.appendChild(table);
  document.getElementById('detail-panel').style.display = 'flex';
  body.scrollTop = 0;
}

// ── Q&A CARDS ──
const QUESTIONS = [
  { num:'Q1', title:'Welche Prüfung wird von den meisten Studiengängen belegt?',
    sub:'Which exam is shared by the most degree programs? (least unique to any single Studiengang)',
    compute:()=>computeQ1(), jumpCol:'Veranstaltungstitel', needs:['exam','studiengang'] },
  { num:'Q2', title:'Welche Studiengänge teilen sich die meisten Prüfungen mit anderen?',
    sub:'Which degree programs share the most exams with at least one other program?',
    compute:()=>computeQ2(), jumpCol:'StudiengangTxT', needs:['exam','studiengang'] },
  { num:'Q3', title:'Welche Prüfung wird von den meisten Abschlussarten besucht?',

function buildQACards() {
  const cardsEl = document.getElementById('qa-cards');
  cardsEl.innerHTML = '';
  cardStates.length = 0;
  QUESTIONS.forEach(q => {
    const missingCols = q.needs.filter(n => colIdx[n] < 0);
    const card = document.createElement('div');
    card.className = 'pv-card';
    const header = document.createElement('div');
    header.className = 'pv-card-header';
    header.innerHTML =
      '<span class="pv-qnum">' + q.num + '</span>' +
      '<div><div class="pv-qtitle">' + escHtml(q.title) + '</div>' +
      '<div class="pv-qsub">' + escHtml(q.sub) +
      (missingCols.length ? ' <span style="color:#e05c5c">[missing: ' + missingCols.join(', ') + ']</span>' : '') +
      '</div></div>';
    const btn = document.createElement('button');
    btn.className = 'pv-show-btn';
    btn.textContent = '▶ Show';
    if (missingCols.length) btn.disabled = true;
    header.appendChild(btn);
    card.appendChild(header);
    const resultsDiv = document.createElement('div');
    resultsDiv.className = 'pv-results';
    resultsDiv.style.display = 'none';
    card.appendChild(resultsDiv);
    const state = { q, btn, resultsDiv, computed: null, open: false };
    cardStates.push(state);
    btn.addEventListener('click', () => {
      state.open = !state.open;
      btn.textContent = state.open ? '▼ Hide' : '▶ Show';
      btn.classList.toggle('open', state.open);
      resultsDiv.style.display = state.open ? '' : 'none';
      if (state.open && !state.computed) {
        resultsDiv.innerHTML = '<div class="pv-computing">Computing…</div>';
        setTimeout(() => { state.computed = q.compute(); renderResults(resultsDiv, state.computed, q.jumpCol); }, 10);
      }
    });
    cardsEl.appendChild(card);
  });
}

const examSearchInput = document.getElementById('exam-search');
const examSearchResults = document.getElementById('exam-search-results');
const examSearchClear = document.getElementById('exam-search-clear');
let searchResultEvs = [];
let searchCursor = -1;

function updateExamSearch() {
  const q = examSearchInput.value.trim().toLowerCase();
  examSearchResults.style.display = 'none';
  searchResultEvs = [];
  if (!q || !vocabs || colIdx.exam < 0) return;

  // Only search within exams currently in the chart
  const activeRows = getActiveRows();
  const examCI = colIdx.exam;
  const seenEv = new Set();
  for (const r of activeRows) seenEv.add(r[examCI]);

  searchResultEvs = [...seenEv]
    .filter(ev => (vocabs[examCI][ev] || '').toLowerCase().includes(q))
    .slice(0, 30);

  if (!searchResultEvs.length) return;
  examSearchResults.innerHTML = '';
  searchResultEvs.forEach((ev, idx) => {
    const item = document.createElement('div');
    item.className = 'exam-sr-item';
    item.textContent = vocabs[examCI][ev] || '?';
    item.addEventListener('mousedown', e => { e.preventDefault(); selectExam(ev); });
    examSearchResults.appendChild(item);
  });
  searchCursor = -1;
  examSearchResults.style.display = '';
}

examSearchInput.addEventListener('input', updateExamSearch);
examSearchInput.addEventListener('keydown', e => {
  const items = examSearchResults.querySelectorAll('.exam-sr-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchCursor = Math.min(searchCursor + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('active', i === searchCursor));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchCursor = Math.max(searchCursor - 1, 0);
    items.forEach((it, i) => it.classList.toggle('active', i === searchCursor));
  } else if (e.key === 'Enter') {
    if (searchCursor >= 0 && searchResultEvs[searchCursor] !== undefined) {
      selectExam(searchResultEvs[searchCursor]);
    } else if (searchResultEvs.length) {
      selectExam(searchResultEvs[0]);
    }
  } else if (e.key === 'Escape') {
    examSearchResults.style.display = 'none';
    examSearchInput.blur();
  }
});
examSearchInput.addEventListener('blur', () => {
  setTimeout(() => { examSearchResults.style.display = 'none'; }, 150);
});
examSearchClear.addEventListener('click', () => {
  examSearchInput.value = '';
  examSearchResults.style.display = 'none';
  selectedExamEv = null;
  document.getElementById('selected-exam-info').style.display = 'none';
  renderRadial();
});

function selectExam(ev) {
  selectedExamEv = ev;
  examSearchInput.value = (vocabs && colIdx.exam >= 0) ? (vocabs[colIdx.exam][ev] || '') : '';
  examSearchResults.style.display = 'none';
  renderRadial();
  updateSelectedExamInfo();
}

function updateSelectedExamInfo() {
  const infoEl = document.getElementById('selected-exam-info');
  if (selectedExamEv === null || outerCI < 0 || !vocabs) { infoEl.style.display = 'none'; return; }
  // Build examToOuter fresh
  const examCI = colIdx.exam;
  const activeRows = getActiveRows();
  const outerSet = new Set();
  for (const r of activeRows) {
    if (r[examCI] === selectedExamEv) outerSet.add(r[outerCI]);
  }
  const outerLabels = [...outerSet].map(ov => vocabs[outerCI][ov] || '?').join(', ');
  infoEl.style.display = '';
  infoEl.innerHTML =
    'Selected: <strong>' + escHtml(vocabs[examCI][selectedExamEv] || '?') + '</strong> &nbsp;·&nbsp; ' +
    'appears in <strong style="color:var(--green)">' + outerSet.size + '</strong> ' +
    escHtml(headers[outerCI] || 'groups') +
    (outerSet.size <= 8 ? ': <span style="color:var(--dim)">' + escHtml(outerLabels) + '</span>' : '') +
    ' &nbsp;<span style="color:var(--dim);cursor:pointer" id="clear-sel-x">✕ clear</span>';
  document.getElementById('clear-sel-x').addEventListener('click', () => {
    selectedExamEv = null; examSearchInput.value = '';
    infoEl.style.display = 'none';
    renderRadial();
  });
}

// ── RADIAL DATA ──
function buildRadialData() {
  if (outerCI < 0 || colIdx.exam < 0) return null;
  const examCI = colIdx.exam;
  const activeRows = getActiveRows();

  const examToOuter = new Map();
  for (const row of activeRows) {
    const ev = row[examCI], ov = row[outerCI];
    if (!examToOuter.has(ev)) examToOuter.set(ev, new Set());
    examToOuter.get(ev).add(ov);
  }

  const outerMap = new Map();
  for (const [ev, outerSet] of examToOuter) {
    const outerCount = outerSet.size;
    const keep = radialMode === 'poly' ? outerCount > 1 : outerCount === 1;
    if (!keep) continue;
    for (const ov of outerSet) {
      if (!outerMap.has(ov)) outerMap.set(ov, []);
      outerMap.get(ov).push({ ev, outerCount });
    }
  }

  const outerGroups = [...outerMap.entries()]
    .map(([ov, exams]) => ({
      ov, label: vocabs[outerCI][ov] || '?',
      exams: exams.sort((a,b) => b.outerCount - a.outerCount)
    }))
    .sort((a,b) => b.exams.length - a.exams.length);

  const allExamVidxSet = new Set();
  for (const g of outerGroups) for (const e of g.exams) allExamVidxSet.add(e.ev);

  return { outerGroups, examToOuter, allExamCount: allExamVidxSet.size };
}

// ── RADIAL RENDER ──
function renderRadial() {
  const wrap = document.getElementById('radial-svg-wrap');
  const statsEl = document.getElementById('radial-stats');

  if (outerCI < 0) {
    wrap.innerHTML = '<div class="pv-computing">Select an outer ring column to render the chart</div>';
    statsEl.innerHTML = '';
    return;
  }

  const data = buildRadialData();
  if (!data) { wrap.innerHTML = '<div class="pv-computing">No data.</div>'; return; }

  const { outerGroups, examToOuter } = data;

  if (!outerGroups.length) {
    wrap.innerHTML = '<div class="pv-computing">No ' + (radialMode === 'poly' ? 'polyvalent' : 'unique') + ' exams found for this dimension.</div>';
    statsEl.innerHTML = '';
    return;
  }

  const totalExams = data.allExamCount;
  const totalOuter = outerGroups.length;
  statsEl.innerHTML =
    '<strong>' + totalExams.toLocaleString() + '</strong> distinct exam titles (' +
    (radialMode === 'poly' ? 'appear in ≥2 outer values' : 'appear in exactly 1 outer value') +
    ') across <strong>' + totalOuter + '</strong> ' + escHtml(headers[outerCI] || 'groups') +
    ' &nbsp;·&nbsp; arc width = exam variety &nbsp;·&nbsp; click an exam node or arc to select';

  // Selected exam outer set
  const selectedOuterSet = selectedExamEv !== null
    ? (examToOuter.get(selectedExamEv) || new Set())
    : null;

  // Layout
  const W = Math.min(wrap.clientWidth || 900, 900);
  const H = W;
  const cx = W / 2, cy = H / 2;
  const outerRingOuter = W * 0.46;
  const outerRingInner = W * 0.38;
  const innerRingR     = W * 0.26;

  const totalWeight = outerGroups.reduce((s, g) => s + g.exams.length, 0);
  const GAP_RAD = outerGroups.length > 1 ? 0.012 : 0;
  let angle = -Math.PI / 2;

  outerGroups.forEach((g, gi) => {
    const sweep = (g.exams.length / totalWeight) * (2 * Math.PI) - GAP_RAD;
    g.startAngle = angle + GAP_RAD / 2;
    g.endAngle   = angle + GAP_RAD / 2 + sweep;
    g.midAngle   = (g.startAngle + g.endAngle) / 2;
    g.color      = PALETTE[gi % PALETTE.length];
    angle += sweep + GAP_RAD;
  });

  // Collect unique exam vidxes
  const shownExamVidxes = [];
  const seenExams = new Set();
  for (const g of outerGroups) {
    for (const e of g.exams) {
      if (!seenExams.has(e.ev)) { seenExams.add(e.ev); shownExamVidxes.push(e.ev); }
    }
  }

  function examMidAngle(ev) {
    const outerSet = examToOuter.get(ev) || new Set();
    let sumAngle = 0, count = 0;
    for (const g of outerGroups) {
      if (outerSet.has(g.ov)) { sumAngle += g.midAngle; count++; }
    }
    return count ? sumAngle / count : 0;
  }

  shownExamVidxes.sort((a, b) => examMidAngle(a) - examMidAngle(b));

  const examAngleStep = shownExamVidxes.length > 0 ? (2 * Math.PI) / shownExamVidxes.length : 0;
  const examAngleMap = new Map();
  shownExamVidxes.forEach((ev, i) => {
    examAngleMap.set(ev, -Math.PI / 2 + i * examAngleStep);
  });

  const maxOuterCount = Math.max(...[...examToOuter.values()].map(s => s.size), 1);

  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

  // click on background = deselect
  const bgRect = document.createElementNS(ns, 'rect');
  bgRect.setAttribute('width', W); bgRect.setAttribute('height', H);
  bgRect.setAttribute('fill', 'transparent');
  bgRect.style.cursor = 'default';
  bgRect.addEventListener('click', () => {
    selectedExamEv = null; examSearchInput.value = '';
    document.getElementById('selected-exam-info').style.display = 'none';
    renderRadial();
  });
  svg.appendChild(bgRect);

  function arcPath(cx, cy, r1, r2, startA, endA) {
    const x1o = cx + r2 * Math.cos(startA), y1o = cy + r2 * Math.sin(startA);
    const x2o = cx + r2 * Math.cos(endA),   y2o = cy + r2 * Math.sin(endA);
    const x1i = cx + r1 * Math.cos(endA),   y1i = cy + r1 * Math.sin(endA);
    const x2i = cx + r1 * Math.cos(startA), y2i = cy + r1 * Math.sin(startA);
    const large = (endA - startA) > Math.PI ? 1 : 0;
    return `M ${x1o} ${y1o} A ${r2} ${r2} 0 ${large} 1 ${x2o} ${y2o} L ${x1i} ${y1i} A ${r1} ${r1} 0 ${large} 0 ${x2i} ${y2i} Z`;
  }

  // ── Lines (only drawn when an exam is selected, or always in dim mode) ──
  const lineGroup = document.createElementNS(ns, 'g');

  if (selectedExamEv !== null) {
    // Only draw lines for the selected exam
    const ea = examAngleMap.get(selectedExamEv);
    if (ea !== undefined) {
      const ex = cx + innerRingR * Math.cos(ea);
      const ey = cy + innerRingR * Math.sin(ea);
      for (const g of outerGroups) {
        if (!selectedOuterSet.has(g.ov)) continue;
        const outerMx = cx + (outerRingInner - 4) * Math.cos(g.midAngle);
        const outerMy = cy + (outerRingInner - 4) * Math.sin(g.midAngle);
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', ex); line.setAttribute('y1', ey);
        line.setAttribute('x2', outerMx); line.setAttribute('y2', outerMy);
        line.setAttribute('stroke', g.color);
        line.setAttribute('stroke-width', '1.5');
        line.setAttribute('opacity', '0.9');
        lineGroup.appendChild(line);
      }
    }
  } else {
    // Draw all lines, dimmed
    lineGroup.setAttribute('opacity', '0.18');
    for (const g of outerGroups) {
      const outerMx = cx + (outerRingInner - 4) * Math.cos(g.midAngle);
      const outerMy = cy + (outerRingInner - 4) * Math.sin(g.midAngle);
      for (const e of g.exams) {
        const ea = examAngleMap.get(e.ev);
        if (ea === undefined) continue;
        const ex = cx + innerRingR * Math.cos(ea);
        const ey = cy + innerRingR * Math.sin(ea);
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', ex); line.setAttribute('y1', ey);
        line.setAttribute('x2', outerMx); line.setAttribute('y2', outerMy);
        line.setAttribute('stroke', g.color);
        line.setAttribute('stroke-width', '0.7');
        lineGroup.appendChild(line);
      }
    }
  }
  svg.appendChild(lineGroup);

  // ── Outer arcs ──
  const arcEls = new Map(); // ov -> SVG path element
  const arcGroup = document.createElementNS(ns, 'g');
  outerGroups.forEach(g => {
    const isHighlighted = selectedOuterSet && selectedOuterSet.has(g.ov);
    const isDimmed = selectedOuterSet && !selectedOuterSet.has(g.ov);

    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', arcPath(cx, cy, outerRingInner, outerRingOuter, g.startAngle, g.endAngle));
    path.setAttribute('fill', g.color);
    path.setAttribute('opacity', isDimmed ? '0.15' : '1');
    path.style.cursor = 'pointer';
    path.style.transition = 'opacity 0.2s';
    arcEls.set(g.ov, path);

    if (isHighlighted) {
      // Add glow ring
      const glow = document.createElementNS(ns, 'path');
      glow.setAttribute('d', arcPath(cx, cy, outerRingInner - 3, outerRingOuter + 4, g.startAngle, g.endAngle));
      glow.setAttribute('fill', 'none');
      glow.setAttribute('stroke', g.color);
      glow.setAttribute('stroke-width', '3');
      glow.setAttribute('opacity', '0.6');
      arcGroup.appendChild(glow);
    }

    path.addEventListener('mouseenter', evt => {
      if (!isDimmed) path.setAttribute('opacity', '0.75');
      showTooltip(evt,
        '<strong style="color:' + g.color + '">' + escHtml(g.label) + '</strong><br>' +
        '<strong>' + g.exams.length + '</strong> distinct exam titles<br>' +
        (isHighlighted ? '<span style="color:var(--green)">✓ contains selected exam</span>' : '')
      );
    });
    path.addEventListener('mousemove', moveTooltip);
    path.addEventListener('mouseleave', () => {
      path.setAttribute('opacity', isDimmed ? '0.15' : '1');
      hideTooltip();
    });
    path.addEventListener('click', evt => {
      evt.stopPropagation();
      showDetail(headers[outerCI], g.label, g.exams.length + ' exams');
    });
    arcGroup.appendChild(path);
  });
  svg.appendChild(arcGroup);

  // ── Arc labels ──
  const labelR = outerRingOuter + 10;
  outerGroups.forEach(g => {
    const sweep = g.endAngle - g.startAngle;
    if (sweep < 0.07) return;
    const isDimmed = selectedOuterSet && !selectedOuterSet.has(g.ov);
    const lx = cx + labelR * Math.cos(g.midAngle);
    const ly = cy + labelR * Math.sin(g.midAngle);
    const txt = document.createElementNS(ns, 'text');
    txt.setAttribute('x', lx); txt.setAttribute('y', ly);
    txt.setAttribute('fill', isDimmed ? '#333' : g.color);
    txt.setAttribute('font-size', '9');
    txt.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
    txt.setAttribute('font-weight', '600');
    txt.setAttribute('text-anchor', Math.cos(g.midAngle) > 0 ? 'start' : 'end');
    txt.setAttribute('dominant-baseline', 'middle');
    txt.setAttribute('pointer-events', 'none');
    const maxLen = Math.max(8, Math.round(sweep * 60));
    txt.textContent = g.label.length > maxLen ? g.label.slice(0, maxLen - 1) + '…' : g.label;
    svg.appendChild(txt);
  });

  // ── Exam nodes ──
  const nodeGroup = document.createElementNS(ns, 'g');
  shownExamVidxes.forEach(ev => {
    const ea = examAngleMap.get(ev);
    const outerCount = examToOuter.get(ev) ? examToOuter.get(ev).size : 1;
    const nr = 2.5 + (outerCount / maxOuterCount) * 3.5;
    const nx = cx + innerRingR * Math.cos(ea);
    const ny = cy + innerRingR * Math.sin(ea);

    const isSelected = ev === selectedExamEv;
    const isDimmed = selectedExamEv !== null && !isSelected;

    let nodeColor = '#c9cdd8';
    const outerSet = examToOuter.get(ev) || new Set();
    if (outerSet.size === 1) {
      const ov = [...outerSet][0];
      const g = outerGroups.find(g => g.ov === ov);
      if (g) nodeColor = g.color;
    }

    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', nx); circle.setAttribute('cy', ny);
    circle.setAttribute('r', isSelected ? nr + 3 : nr);
    circle.setAttribute('fill', isSelected ? '#fff' : nodeColor);
    circle.setAttribute('opacity', isDimmed ? '0.12' : '0.85');
    circle.style.cursor = 'pointer';
    circle.style.transition = 'opacity 0.2s, r 0.1s';

    if (isSelected) {
      const ring = document.createElementNS(ns, 'circle');
      ring.setAttribute('cx', nx); ring.setAttribute('cy', ny);
      ring.setAttribute('r', nr + 6);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#fff');
      ring.setAttribute('stroke-width', '1.5');
      ring.setAttribute('opacity', '0.7');
      ring.setAttribute('pointer-events', 'none');
      nodeGroup.appendChild(ring);
    }

    const examLabel = vocabs[colIdx.exam][ev] || '?';
    const outerLabels = [...outerSet].map(ov => vocabs[outerCI][ov] || '?');

    circle.addEventListener('mouseenter', me => {
      if (!isDimmed) circle.setAttribute('r', (isSelected ? nr + 3 : nr) + 2);
      showTooltip(me,
        '<strong>' + escHtml(examLabel) + '</strong><br>' +
        outerLabels.slice(0, 6).map(l => '· ' + escHtml(l)).join('<br>') +
        (outerLabels.length > 6 ? '<br>· …' + (outerLabels.length - 6) + ' more' : '') +
        '<br><span style="color:var(--dim)">' + outerCount + ' ' + escHtml(headers[outerCI] || 'groups') + '</span>'
      );
    });
    circle.addEventListener('mousemove', moveTooltip);
    circle.addEventListener('mouseleave', () => {
      circle.setAttribute('r', isSelected ? nr + 3 : nr);
      hideTooltip();
    });
    circle.addEventListener('click', evt => {
      evt.stopPropagation();
      if (selectedExamEv === ev) {
        selectedExamEv = null;
        examSearchInput.value = '';
        document.getElementById('selected-exam-info').style.display = 'none';
      } else {
        selectedExamEv = ev;
        examSearchInput.value = examLabel;
      }
      renderRadial();
      if (selectedExamEv !== null) updateSelectedExamInfo();
    });

    nodeGroup.appendChild(circle);
  });
  svg.appendChild(nodeGroup);

  // ── Center label ──
  const cLabel = document.createElementNS(ns, 'text');
  cLabel.setAttribute('x', cx); cLabel.setAttribute('y', cy - 10);
  cLabel.setAttribute('text-anchor', 'middle'); cLabel.setAttribute('dominant-baseline', 'middle');
  cLabel.setAttribute('fill', '#606674'); cLabel.setAttribute('font-size', '11');
  cLabel.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
  cLabel.setAttribute('pointer-events', 'none');
  cLabel.textContent = radialMode === 'poly' ? 'Polyvalent exams' : 'Unique exams';
  svg.appendChild(cLabel);

  const cLabel2 = document.createElementNS(ns, 'text');
  cLabel2.setAttribute('x', cx); cLabel2.setAttribute('y', cy + 8);
  cLabel2.setAttribute('text-anchor', 'middle'); cLabel2.setAttribute('dominant-baseline', 'middle');
  cLabel2.setAttribute('fill', '#4f8ef7'); cLabel2.setAttribute('font-size', '14');
  cLabel2.setAttribute('font-weight', '700');
  cLabel2.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
  cLabel2.setAttribute('pointer-events', 'none');
  cLabel2.textContent = totalExams.toLocaleString();
  svg.appendChild(cLabel2);

  wrap.innerHTML = '';
  wrap.appendChild(svg);

  // Pulse highlighted arcs after render
  if (selectedOuterSet && selectedOuterSet.size > 0) {
    requestAnimationFrame(() => {
      for (const [ov, el] of arcEls) {
        if (selectedOuterSet.has(ov)) {
          el.classList.remove('arc-pulse');
          void el.offsetWidth;
          el.classList.add('arc-pulse');
        }
      }
    });
  }
}

  document.getElementById('selected-exam-info').style.display = 'none';
  renderRadial();
});
document.getElementById('toggle-unique').addEventListener('click', () => {
  radialMode = 'unique';
  document.getElementById('toggle-unique').classList.add('active');
  document.getElementById('toggle-poly').classList.remove('active');
  selectedExamEv = null; examSearchInput.value = '';
  document.getElementById('selected-exam-info').style.display = 'none';
  renderRadial();
});
document.getElementById('outer-dim-sel').addEventListener('change', () => {
  outerCI = parseInt(document.getElementById('outer-dim-sel').value, 10);
  selectedExamEv = null; examSearchInput.value = '';
  document.getElementById('selected-exam-info').style.display = 'none';
  renderRadial();
});

// ── INIT ──
async function init() {
  if (!meta) return;
  const filename = meta.filename;
  if (!filename) { showError('No filename in session data.'); return; }

  document.getElementById('loading-bar').style.display = '';
  document.getElementById('loading-bar').textContent = '⏳ Loading ' + filename + '…';

  let text;
  try {
    const res = await fetch(filename);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    text = await res.text();
  } catch(e) {
    document.getElementById('loading-bar').style.display = 'none';
    showError('Could not load <strong>' + escHtml(filename) + '</strong>: ' + e.message +
      '<br>Make sure the file is served from the same HTTP server as this page.');
    return;
  }

  document.getElementById('loading-bar').textContent = '⚙️ Parsing CSV…';
  await new Promise(r => setTimeout(r, 20));

  const parsed = parseCSV(text, meta.delimiter || 'auto');
  document.getElementById('loading-bar').style.display = 'none';
  if (!parsed) { showError('Could not parse CSV file.'); return; }

  headers = parsed.headers;
  vocabs  = parsed.vocabs;
  rows    = parsed.rows;

  colIdx.exam        = findCol(['Veranstaltungstitel']);
  colIdx.studiengang = findCol(['StudiengangTxT', 'Studiengang']);
  colIdx.abschluss   = findCol(['AbschlussTxT', 'Abschluss']);

  const missing = [];
  if (colIdx.exam < 0)        missing.push('Veranstaltungstitel');
  if (colIdx.studiengang < 0) missing.push('StudiengangTxT');
  if (colIdx.abschluss < 0)   missing.push('AbschlussTxT');
  if (missing.length) {
    showError('Column(s) not found: <strong>' + missing.join(', ') + '</strong><br>Available: ' + headers.join(', '));
  }

  document.getElementById('col-info').innerHTML =
    '<strong>' + rows.length.toLocaleString() + '</strong> rows &nbsp;·&nbsp; ' +
    escHtml(filename) + ' &nbsp;·&nbsp; ' +
    'Exam: <strong>' + escHtml(headers[colIdx.exam] || '—') + '</strong> &nbsp;·&nbsp; ' +
    'Studiengang: <strong>' + escHtml(headers[colIdx.studiengang] || '—') + '</strong> &nbsp;·&nbsp; ' +
    'Abschluss: <strong>' + escHtml(headers[colIdx.abschluss] || '—') + '</strong>';

  buildQACards();

  // Populate outer ring selector
  const outerSel = document.getElementById('outer-dim-sel');
  headers.forEach((h, i) => {
    if (i === colIdx.exam) return;
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = h + ' (' + (vocabs[i] ? vocabs[i].length : 0) + ')';
    outerSel.appendChild(opt);
    if (i === colIdx.studiengang) { outerSel.value = String(i); outerCI = i; }
  });

  // Populate subset selector
  const colSel = document.getElementById('subset-col-sel');
  const valInp = document.getElementById('subset-val-inp');
  const clearBtn = document.getElementById('subset-clear-btn');
  const blankOpt = document.createElement('option');
  blankOpt.value = '-1'; blankOpt.textContent = '— column —';
  colSel.appendChild(blankOpt);
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = h + ' (' + (vocabs[i] ? vocabs[i].length : 0) + ')';
    colSel.appendChild(opt);
  });
  colSel.addEventListener('change', () => { subsetCI = parseInt(colSel.value, 10); onSubsetChange(); });
  valInp.addEventListener('input', () => { subsetVal = valInp.value; onSubsetChange(); });
  clearBtn.addEventListener('click', () => {
    subsetCI = -1; subsetVal = ''; colSel.value = '-1'; valInp.value = '';
    onSubsetChange();
  });

  document.getElementById('subset-bar').style.display = 'flex';
  updateSubsetCount();

  if (outerCI >= 0) renderRadial();
}

init();
</script>
</body>
</html>
