<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Polyvalenzen — Exam Sharing Analysis</title>
<style>
:root {
  --bg: #111318; --panel: #16191f; --sidebar: #1a1d24;
  --border: #2a2d35; --border2: #353840;
  --text: #c9cdd8; --dim: #606674; --bright: #e8eaf0;
  --accent: #4f8ef7; --green: #3ecf8e; --yellow: #f7c948;
  --hover: #1f2330;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); }

#topbar {
  height: 46px; background: #0d0f14;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 18px; flex-shrink: 0;
}
#topbar h1 { font-size: 14px; font-weight: 700; color: var(--bright); }
#topbar h1 em { color: var(--accent); font-style: normal; }
#col-info { font-size: 11px; color: var(--dim); margin-left: auto; }
#col-info strong { color: var(--text); }

#subset-bar {
  background: var(--panel); border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 10px; padding: 8px 18px; flex-shrink: 0;
}
#subset-bar label { font-size: 11px; color: var(--dim); white-space: nowrap; }
#subset-col-sel {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; max-width: 220px;
}
#subset-val-inp {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 4px 10px; border-radius: 4px; font-size: 12px; width: 180px;
}
#subset-val-inp::placeholder { color: var(--dim); }
#subset-clear-btn {
  background: none; border: 1px solid var(--border2); color: var(--dim);
  padding: 3px 9px; border-radius: 4px; font-size: 11px; cursor: pointer;
}
#subset-clear-btn:hover { color: var(--text); border-color: var(--dim); }
#subset-count { font-size: 11px; margin-left: 6px; color: var(--dim); }
#subset-count strong { color: var(--green); }

#main { max-width: 960px; margin: 0 auto; padding: 28px 20px 80px; }

/* ── SECTION HEADERS ── */
.section-heading {
  font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--dim); border-bottom: 1px solid var(--border); padding-bottom: 8px;
  margin-bottom: 16px; margin-top: 32px;
}
.section-heading:first-child { margin-top: 0; }

#error-banner {
  background: #2d1515; border: 1px solid #6b2020; border-radius: 6px;
  padding: 14px 18px; color: #f08080; margin-bottom: 20px; font-size: 12px; display:none;
}
#loading-bar {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: 18px; color: var(--dim); font-size: 12px; margin-bottom: 20px; text-align:center; display:none;
}

/* ── Q&A CARDS ── */
.pv-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 16px; overflow: hidden;
}
.pv-card-header {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 18px;
}
.pv-qnum {
  font-size: 11px; font-weight: 700; color: var(--accent);
  background: rgba(79,142,247,.12); border: 1px solid rgba(79,142,247,.3);
  border-radius: 4px; padding: 2px 7px; flex-shrink: 0; margin-top: 2px;
}
.pv-vtag {
  font-size: 11px; font-weight: 700; color: var(--green);
  background: rgba(62,207,142,.1); border: 1px solid rgba(62,207,142,.3);
  border-radius: 4px; padding: 2px 7px; flex-shrink: 0; margin-top: 2px;
}
.pv-qtitle { font-size: 13px; font-weight: 600; color: var(--bright); line-height: 1.5; }
.pv-qsub { font-size: 11px; color: var(--dim); margin-top: 3px; line-height: 1.5; }
.pv-show-btn {
  margin-left: auto; flex-shrink: 0;
  background: var(--bg); border: 1px solid var(--border2);
  color: var(--accent); padding: 5px 12px; border-radius: 4px;
  font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
  transition: all .1s; align-self: center;
}
.pv-show-btn:hover:not(:disabled) { background: rgba(79,142,247,.12); border-color: var(--accent); }
.pv-show-btn.open { background: var(--accent); color: #fff; border-color: var(--accent); }
.pv-show-btn:disabled { opacity: .4; cursor: not-allowed; }

.pv-results { border-top: 1px solid var(--border); padding: 10px 0 6px; }
.pv-results-inner { padding: 0 18px; }

.pv-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 8px; border-radius: 4px; cursor: pointer;
  transition: background .1s;
}
.pv-row:hover { background: var(--hover); }
.pv-rank { font-size: 10px; color: var(--dim); width: 28px; text-align: right; flex-shrink: 0; }
.pv-label { font-size: 12px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pv-bar-wrap { width: 140px; flex-shrink: 0; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.pv-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
.pv-score { font-size: 11px; color: var(--accent); font-weight: 600; width: 120px; flex-shrink: 0; text-align: right; }

.pv-show-all {
  margin: 8px 18px 10px; padding: 5px 12px; background: none;
  border: 1px solid var(--border2); color: var(--dim); border-radius: 4px;
  font-size: 11px; cursor: pointer; display: block; width: calc(100% - 36px); text-align: center;
}
.pv-show-all:hover { color: var(--text); border-color: var(--dim); }
.pv-computing { padding: 18px; text-align: center; color: var(--dim); font-size: 12px; }
.pv-row-hint { font-size: 10px; color: var(--dim); padding: 4px 8px 8px; font-style: italic; }


/* ── DETAIL PANEL ── */
#detail-panel {
  position: fixed; inset: 0; background: var(--bg); z-index: 100;
  display: none; flex-direction: column;
}
#detail-topbar {
  height: 46px; background: #0d0f14; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 18px; flex-shrink: 0;
}
#detail-back {
  background: none; border: 1px solid var(--border2); color: var(--text);
  padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer;
}
#detail-back:hover { border-color: var(--dim); }
#detail-title { font-size: 13px; font-weight: 600; color: var(--bright); }
#detail-subtitle { font-size: 11px; color: var(--dim); margin-left: 4px; }
#detail-body { flex: 1; overflow: auto; padding: 20px 28px; }

.dt-table { border-collapse: collapse; width: 100%; font-size: 12px; }
.dt-table th {
  text-align: left; padding: 8px 12px; font-size: 10px; font-weight: 700;
  color: var(--dim); text-transform: uppercase; letter-spacing: .07em;
  border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0;
}
.dt-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
.dt-table tr:hover td { background: var(--hover); }
</style>
</head>
<body>

<div id="topbar">
  <h1>⬡ Polyvalenzen <em>Exam Sharing Analysis</em></h1>
  <div id="col-info"></div>
</div>

<div id="subset-bar">
  <label>Subset:</label>
  <select id="subset-col-sel"></select>
  <input id="subset-val-inp" type="text" placeholder="filter value…">
  <button id="subset-clear-btn">✕ Clear</button>
  <span id="subset-count"></span>
</div>

<div id="main">
  <div id="error-banner"></div>
  <div id="loading-bar">⏳ Loading and parsing CSV…</div>

  <!-- ── SECTION 1: Q&A ── -->
  <div class="section-heading">Q &amp; A</div>
  <div id="qa-cards"></div>

</div>

<!-- Detail panel -->
<div id="detail-panel">
  <div id="detail-topbar">
    <button id="detail-back">← Back</button>
    <span id="detail-title"></span>
    <span id="detail-subtitle"></span>
  </div>
  <div id="detail-body"></div>
</div>

<script>
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CSV PARSER ──
function detectDelimiter(sample) {
  const firstLine = sample.slice(0, 2000).split('\n')[0];
  const delims = [';', ',', '\t', '|'];
  let best = ',', bestN = 0;
  for (const d of delims) {
    const n = (firstLine.match(new RegExp(d === '\t' ? '\t' : ('\\' + d), 'g')) || []).length;
    if (n > bestN) { bestN = n; best = d; }
  }
  return best;
}

function parseCSV(text, delimOverride) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const delim = (!delimOverride || delimOverride === 'auto') ? detectDelimiter(text) : delimOverride;
  const allRows = [];
  let row = [], cell = '', inQuote = false, i = 0;
  const len = text.length;
  while (i < len) {
    const ch = text[i];
    if (inQuote) {
      if (ch === '"') {
        if (text[i+1] === '"') { cell += '"'; i += 2; }
        else { inQuote = false; i++; }
      } else { cell += ch; i++; }
    } else {
      if (ch === '"') { inQuote = true; i++; }
      else if (ch === delim) { row.push(cell.trim()); cell = ''; i++; }
      else if (ch === '\n') {
        row.push(cell.trim()); cell = '';
        if (row.some(c => c !== '')) allRows.push(row);
        row = []; i++;
      } else { cell += ch; i++; }
    }
  }
  row.push(cell.trim());
  if (row.some(c => c !== '')) allRows.push(row);
  if (allRows.length < 2) return null;

  const headers = allRows[0];
  const numCols = headers.length;
  const vocabMaps = headers.map(() => new Map());
  const rawRows = [];
  for (let li = 1; li < allRows.length; li++) {
    const cells = allRows[li];
    while (cells.length < numCols) cells.push('');
    rawRows.push(cells.slice(0, numCols));
    for (let ci = 0; ci < numCols; ci++) {
      const v = cells[ci] || '';
      if (!vocabMaps[ci].has(v)) vocabMaps[ci].set(v, vocabMaps[ci].size);
    }
  }
  const vocabs = vocabMaps.map(m => { const a = new Array(m.size); for (const [v,i] of m) a[i]=v; return a; });
  const rows = rawRows.map(cells => cells.map((v, ci) => vocabMaps[ci].get(v) ?? 0));
  return { headers, vocabs, rows, delimiter: delim };
}

// ── STATE ──
const metaRaw = sessionStorage.getItem('polyvData');
if (!metaRaw) {
  document.getElementById('error-banner').style.display = '';
  document.getElementById('error-banner').textContent =
    'No data found. Open this page from the Cluster Explorer via the ⬡ Polyvalenzen button.';
}

let meta = null, headers, vocabs, rows, colIdx = {};
let subsetCI = -1, subsetVal = '';
try { meta = metaRaw ? JSON.parse(metaRaw) : null; } catch(e) {}

function getActiveRows() {
  if (subsetCI < 0 || subsetVal === '') return rows;
  const lower = subsetVal.toLowerCase();
  return rows.filter(r => (vocabs[subsetCI][r[subsetCI]] || '').toLowerCase().includes(lower));
}

function findCol(names) {
  for (const n of names) {
    const i = (headers||[]).findIndex(h => h.toLowerCase() === n.toLowerCase());
    if (i >= 0) return i;
  }
  return -1;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.style.display = '';
  el.innerHTML = msg;
}

// ── Q&A COMPUTATIONS ──
function computeQ1() {
  const examCI = colIdx.exam, sgCI = colIdx.studiengang;
  const map = new Map();
  for (const row of getActiveRows()) {
    const ev = row[examCI], sv = row[sgCI];
    if (!map.has(ev)) map.set(ev, new Set());
    map.get(ev).add(sv);
  }
  return [...map.entries()]
    .map(([ev, s]) => ({ label: vocabs[examCI][ev], score: s.size, scoreLabel: s.size + ' Studiengänge' }))
    .sort((a,b) => b.score - a.score);
}

function computeQ2() {
  const examCI = colIdx.exam, sgCI = colIdx.studiengang;
  const examToSG = new Map(), sgToExams = new Map();
  for (const row of getActiveRows()) {
    const ev = row[examCI], sv = row[sgCI];
    if (!examToSG.has(ev)) examToSG.set(ev, new Set());
    examToSG.get(ev).add(sv);
    if (!sgToExams.has(sv)) sgToExams.set(sv, new Set());
    sgToExams.get(sv).add(ev);
  }
  return [...sgToExams.entries()]
    .map(([sv, exams]) => {
      const shared = [...exams].filter(ev => examToSG.get(ev).size > 1).length;
      return { label: vocabs[sgCI][sv], score: shared, scoreLabel: shared + ' shared exams (of ' + exams.size + ')' };
    })
    .sort((a,b) => b.score - a.score);
}

function computeQ3() {
  const examCI = colIdx.exam, abCI = colIdx.abschluss;
  const map = new Map();
  for (const row of getActiveRows()) {
    const ev = row[examCI], av = row[abCI];
    if (!map.has(ev)) map.set(ev, new Set());
    map.get(ev).add(av);
  }
  return [...map.entries()]
    .map(([ev, s]) => ({ label: vocabs[examCI][ev], score: s.size, scoreLabel: s.size + ' Abschlussarten' }))
    .sort((a,b) => b.score - a.score);
}

// ── Q&A RENDER ──
const TOP_N = 50;

function renderResults(container, results, jumpColHeader) {
  container.innerHTML = '';
  if (!results.length) { container.innerHTML = '<div class="pv-computing">No results.</div>'; return; }
  const maxScore = results[0].score;
  const shown = results.slice(0, TOP_N);
  const rest  = results.slice(TOP_N);
  const inner = document.createElement('div');
  inner.className = 'pv-results-inner';
  const hint = document.createElement('div');
  hint.className = 'pv-row-hint';
  hint.textContent = 'Click any row to see all its data';
  inner.appendChild(hint);

  function addRow(r, rank) {
    const el = document.createElement('div');
    el.className = 'pv-row';
    const pct = maxScore > 0 ? (r.score / maxScore * 100).toFixed(1) : 0;
    el.innerHTML =
      '<span class="pv-rank">' + rank + '.</span>' +
      '<span class="pv-label" title="' + escHtml(r.label) + '">' + escHtml(r.label) + '</span>' +
      '<span class="pv-bar-wrap"><span class="pv-bar-fill" style="width:' + pct + '%"></span></span>' +
      '<span class="pv-score">' + escHtml(r.scoreLabel) + '</span>';
    el.addEventListener('click', () => showDetail(jumpColHeader, r.label, r.scoreLabel));
    inner.appendChild(el);
  }

  shown.forEach((r, i) => addRow(r, i + 1));
  if (rest.length) {
    const btn = document.createElement('button');
    btn.className = 'pv-show-all';
    btn.textContent = 'Show all ' + results.length.toLocaleString() + ' results';
    btn.addEventListener('click', () => { btn.remove(); rest.forEach((r,i) => addRow(r, TOP_N+i+1)); });
    inner.appendChild(btn);
  }
  container.appendChild(inner);
}

// ── DETAIL PANEL ──
document.getElementById('detail-back').addEventListener('click', () => {
  document.getElementById('detail-panel').style.display = 'none';
});

function showDetail(colHeader, value, scoreLabel) {
  const ci = (headers || []).findIndex(h => h === colHeader);
  if (ci < 0 || !rows) return;
  const vidx = (vocabs[ci] || []).findIndex(v => v === value);
  if (vidx < 0) return;
  const matchRows = getActiveRows().filter(row => row[ci] === vidx);
  const displayCols = headers.map((h, i) => ({ h, i })).filter(c => c.i !== ci);
  document.getElementById('detail-title').textContent = value;
  document.getElementById('detail-subtitle').textContent =
    '· ' + matchRows.length.toLocaleString() + ' rows · ' + scoreLabel;
  const body = document.getElementById('detail-body');
  body.innerHTML = '';
  const table = document.createElement('table');
  table.className = 'dt-table';
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  displayCols.forEach(c => { const th = document.createElement('th'); th.textContent = c.h; hrow.appendChild(th); });
  thead.appendChild(hrow); table.appendChild(thead);
  const tbody = document.createElement('tbody');
  const limit = Math.min(matchRows.length, 2000);
  for (let ri = 0; ri < limit; ri++) {
    const row = matchRows[ri];
    const tr = document.createElement('tr');
    displayCols.forEach(c => { const td = document.createElement('td'); td.textContent = vocabs[c.i][row[c.i]] ?? ''; tr.appendChild(td); });
    tbody.appendChild(tr);
  }
  if (matchRows.length > 2000) {
    const tr = document.createElement('tr'); const td = document.createElement('td');
    td.colSpan = displayCols.length;
    td.style.cssText = 'color:var(--dim);text-align:center;padding:12px';
    td.textContent = '… and ' + (matchRows.length - 2000).toLocaleString() + ' more rows';
    tr.appendChild(td); tbody.appendChild(tr);
  }
  table.appendChild(tbody); body.appendChild(table);
  document.getElementById('detail-panel').style.display = 'flex';
  body.scrollTop = 0;
}

// ── Q&A CARDS ──
const QUESTIONS = [
  { num:'Q1', title:'Welche Prüfung wird von den meisten Studiengängen belegt?',
    sub:'Which exam is shared by the most degree programs? (least unique to any single Studiengang)',
    compute:()=>computeQ1(), jumpCol:'Veranstaltungstitel', needs:['exam','studiengang'] },
  { num:'Q2', title:'Welche Studiengänge teilen sich die meisten Prüfungen mit anderen?',
    sub:'Which degree programs share the most exams with at least one other program?',
    compute:()=>computeQ2(), jumpCol:'StudiengangTxT', needs:['exam','studiengang'] },
  { num:'Q3', title:'Welche Prüfung wird von den meisten Abschlussarten besucht?',
    sub:'Which exam spans the most degree types (Bachelor, Master, Lehramt…)?',
    compute:()=>computeQ3(), jumpCol:'Veranstaltungstitel', needs:['exam','abschluss'] }
];

const cardStates = [];

function buildQACards() {
  const cardsEl = document.getElementById('qa-cards');
  cardsEl.innerHTML = '';
  cardStates.length = 0;
  QUESTIONS.forEach(q => {
    const missingCols = q.needs.filter(n => colIdx[n] < 0);
    const card = document.createElement('div');
    card.className = 'pv-card';
    const header = document.createElement('div');
    header.className = 'pv-card-header';
    header.innerHTML =
      '<span class="pv-qnum">' + q.num + '</span>' +
      '<div><div class="pv-qtitle">' + escHtml(q.title) + '</div>' +
      '<div class="pv-qsub">' + escHtml(q.sub) +
      (missingCols.length ? ' <span style="color:#e05c5c">[missing: ' + missingCols.join(', ') + ']</span>' : '') +
      '</div></div>';
    const btn = document.createElement('button');
    btn.className = 'pv-show-btn';
    btn.textContent = '▶ Show';
    if (missingCols.length) btn.disabled = true;
    header.appendChild(btn);
    card.appendChild(header);
    const resultsDiv = document.createElement('div');
    resultsDiv.className = 'pv-results';
    resultsDiv.style.display = 'none';
    card.appendChild(resultsDiv);
    const state = { q, btn, resultsDiv, computed: null, open: false };
    cardStates.push(state);
    btn.addEventListener('click', () => {
      state.open = !state.open;
      btn.textContent = state.open ? '▼ Hide' : '▶ Show';
      btn.classList.toggle('open', state.open);
      resultsDiv.style.display = state.open ? '' : 'none';
      if (state.open && !state.computed) {
        resultsDiv.innerHTML = '<div class="pv-computing">Computing…</div>';
        setTimeout(() => { state.computed = q.compute(); renderResults(resultsDiv, state.computed, q.jumpCol); }, 10);
      }
    });
    cardsEl.appendChild(card);
  });
}

// ── SUBSET ──
function updateSubsetCount() {
  const active = getActiveRows();
  const el = document.getElementById('subset-count');
  if (subsetCI >= 0 && subsetVal !== '') {
    el.innerHTML = '<strong>' + active.length.toLocaleString() + '</strong> / ' + rows.length.toLocaleString() + ' rows';
  } else {
    el.innerHTML = '<strong>' + rows.length.toLocaleString() + '</strong> rows';
  }
}

function onSubsetChange() {
  updateSubsetCount();
  cardStates.forEach(state => {
    state.computed = null;
    if (state.open) {
      state.resultsDiv.innerHTML = '<div class="pv-computing">Computing…</div>';
      setTimeout(() => { state.computed = state.q.compute(); renderResults(state.resultsDiv, state.computed, state.q.jumpCol); }, 10);
    }
  });
}


// ── INIT ──
async function init() {
  if (!meta) return;
  const filename = meta.filename;
  if (!filename) { showError('No filename in session data.'); return; }

  document.getElementById('loading-bar').style.display = '';
  document.getElementById('loading-bar').textContent = '⏳ Loading ' + filename + '…';

  let text;
  try {
    const res = await fetch(filename);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    text = await res.text();
  } catch(e) {
    document.getElementById('loading-bar').style.display = 'none';
    showError('Could not load <strong>' + escHtml(filename) + '</strong>: ' + e.message +
      '<br>Make sure the file is served from the same HTTP server as this page.');
    return;
  }

  document.getElementById('loading-bar').textContent = '⚙️ Parsing CSV…';
  await new Promise(r => setTimeout(r, 20));

  const parsed = parseCSV(text, meta.delimiter || 'auto');
  document.getElementById('loading-bar').style.display = 'none';
  if (!parsed) { showError('Could not parse CSV file.'); return; }

  headers = parsed.headers;
  vocabs  = parsed.vocabs;
  rows    = parsed.rows;

  colIdx.exam        = findCol(['Veranstaltungstitel']);
  colIdx.studiengang = findCol(['StudiengangTxT', 'Studiengang']);
  colIdx.abschluss   = findCol(['AbschlussTxT', 'Abschluss']);

  const missing = [];
  if (colIdx.exam < 0)        missing.push('Veranstaltungstitel');
  if (colIdx.studiengang < 0) missing.push('StudiengangTxT');
  if (colIdx.abschluss < 0)   missing.push('AbschlussTxT');
  if (missing.length) {
    showError('Column(s) not found: <strong>' + missing.join(', ') + '</strong><br>Available: ' + headers.join(', '));
  }

  document.getElementById('col-info').innerHTML =
    '<strong>' + rows.length.toLocaleString() + '</strong> rows &nbsp;·&nbsp; ' +
    escHtml(filename) + ' &nbsp;·&nbsp; ' +
    'Exam: <strong>' + escHtml(headers[colIdx.exam] || '—') + '</strong> &nbsp;·&nbsp; ' +
    'Studiengang: <strong>' + escHtml(headers[colIdx.studiengang] || '—') + '</strong> &nbsp;·&nbsp; ' +
    'Abschluss: <strong>' + escHtml(headers[colIdx.abschluss] || '—') + '</strong>';

  buildQACards();

  // ── Populate subset selector ──
  const colSel = document.getElementById('subset-col-sel');
  const valInp = document.getElementById('subset-val-inp');
  const clearBtn = document.getElementById('subset-clear-btn');
  const blankOpt = document.createElement('option');
  blankOpt.value = '-1'; blankOpt.textContent = '— column —';
  colSel.appendChild(blankOpt);
  headers.forEach((h, i) => {
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = h + ' (' + (vocabs[i] ? vocabs[i].length : 0) + ')';
    colSel.appendChild(opt);
  });
  colSel.addEventListener('change', () => { subsetCI = parseInt(colSel.value, 10); onSubsetChange(); });
  valInp.addEventListener('input', () => { subsetVal = valInp.value; onSubsetChange(); });
  clearBtn.addEventListener('click', () => {
    subsetCI = -1; subsetVal = ''; colSel.value = '-1'; valInp.value = '';
    onSubsetChange();
  });

  document.getElementById('subset-bar').style.display = 'flex';
  updateSubsetCount();
}

init();
</script>
</body>
</html>
